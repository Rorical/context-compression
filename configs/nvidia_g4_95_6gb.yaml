# NVIDIA G4 / 95.6 GB GPU memory configuration
# Optimized for a large-memory single-GPU RL run with the current 7B base model.

model:
  name: "unsloth/Qwen2.5-7B-Instruct"
  max_seq_length: 32768
  load_in_4bit: true

lora:
  rank: 128
  alpha: 128
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  dropout: 0.0

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  optim: "adamw_8bit"

  beta: 0.04
  num_generations: 4
  epsilon: 0.2

  max_prompt_length: 24576
  max_completion_length: 4096

  save_steps: 100
  save_total_limit: 3
  logging_steps: 10
  eval_steps: 50

  use_vllm: true
  vllm_gpu_memory_utilization: 0.8
  max_lora_rank: 128
  unsloth_logit_chunk_multiplier: 4
  unsloth_grpo_mini_batch: 1

rewards:
  task_weight: 0.4
  reproduce_weight: 0.3
  format_weight: 0.1
  compression_weight: 0.2
  target_compression_ratio: 0.20
  min_compression_ratio: 0.05
  max_compression_ratio: 0.50
  embedding_model: "BAAI/bge-large-en-v1.5"

data:
  real_datasets:
    - name: "dialogsum"
      split: "train"
      weight: 0.5
      max_samples: 12000
    - name: "samsum"
      split: "train"
      weight: 0.3
      max_samples: 12000
    - name: "ultrachat"
      split: "train_sft"
      weight: 0.4
      max_samples: 30000
    - name: "opus_reasoning"
      split: "train"
      weight: 0.6
      max_samples: 3000
    - name: "kimi_k25"
      split: "train"
      weight: 0.25
      max_samples: 40000
      final_max_samples: 8000

  synthetic:
    num_samples: 2000
    scenarios:
      - "customer_service"
      - "technical_discussion"
      - "educational_tutoring"

  filter_by_length: true
  filter_by_quality: true
  augment: true
  sampling_strategy: "uniform"

evaluation:
  metrics:
    - "compression_ratio"
    - "embedding_similarity"
    - "task_success_rate"
    - "rouge"
    - "bleu"
    - "bertscore"
  batch_size: 4
  max_samples: -1

output:
  output_dir: "./checkpoints/g4_95_6gb"
  log_dir: "./logs/g4_95_6gb"

logging:
  use_wandb: false
  wandb_project: "context-compression"
  run_name: "g4-95-6gb"

gpu:
  memory_gb: 95.6
