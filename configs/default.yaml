# Context Compression Training Configuration
# 上下文压缩训练配置文件

# Model Configuration
model:
  name: "unsloth/Qwen2.5-7B-Instruct"  # 基础模型
  max_seq_length: 8192                    # 最大序列长度
  load_in_4bit: true                      # 4-bit量化
  
# LoRA Configuration
lora:
  rank: 64                                # LoRA秩
  alpha: 64                               # LoRA alpha
  target_modules:                         # 目标模块
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  dropout: 0.0

# Training Configuration
training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  optim: "adamw_8bit"
  
  # GRPO specific
  beta: 0.04                              # KL惩罚系数
  num_generations: 2                      # 每组采样数量
  epsilon: 0.2                            # Clipping阈值
  
  # Sequence lengths
  max_prompt_length: 4096
  max_completion_length: 1024
  
  # Checkpointing
  save_steps: 100
  save_total_limit: 3
  
  # Logging
  logging_steps: 10
  eval_steps: 50
  
  # vLLM configuration
  use_vllm: true
  vllm_gpu_memory_utilization: 0.7
  max_lora_rank: 64
  
  # Unsloth optimizations
  unsloth_logit_chunk_multiplier: 4
  unsloth_grpo_mini_batch: 1

# Reward Configuration
rewards:
  # 权重配置 (总和应为1.0)
  task_weight: 0.4                        # 任务成功率权重
  reproduce_weight: 0.3                   # 复现率权重
  format_weight: 0.1                      # 格式奖励权重
  compression_weight: 0.2                 # 压缩率权重
  
  # 压缩率目标
  target_compression_ratio: 0.20          # 目标压缩到20%
  min_compression_ratio: 0.05             # 最低5%
  max_compression_ratio: 0.50             # 最高50%
  
  # Embedding模型
  embedding_model: "BAAI/bge-large-en-v1.5"

# Data Configuration
data:
  # 真实数据源
  real_datasets:
    - name: "dialogsum"
      split: "train"
      weight: 0.4
      max_samples: 10000
    - name: "samsum"
      split: "train"
      weight: 0.3
      max_samples: 10000
    - name: "ultrachat"
      split: "train_sft"
      weight: 0.3
      max_samples: 20000
    - name: "opus_reasoning"
      split: "train"
      weight: 0.5
      max_samples: 3000
    - name: "kimi_k25"
      split: "train"
      weight: 0.2
      max_samples: 20000
      final_max_samples: 4000
  
  # 合成数据
  synthetic:
    num_samples: 1000
    scenarios:
      - "customer_service"
      - "technical_discussion"
      - "educational_tutoring"
  
  # 预处理
  filter_by_length: true
  filter_by_quality: true
  augment: true
  
  # 采样策略
  sampling_strategy: "uniform"  # uniform, difficulty_based, domain_balanced

# Evaluation Configuration
evaluation:
  metrics:
    - "compression_ratio"
    - "embedding_similarity"
    - "task_success_rate"
    - "rouge"
    - "bleu"
    - "bertscore"
  
  batch_size: 4
  max_samples: -1  # -1 for all

# Output Configuration
output:
  output_dir: "./checkpoints"
  log_dir: "./logs"
  
# Logging Configuration
logging:
  use_wandb: false
  wandb_project: "context-compression"
  run_name: null  # auto-generated if null

# GPU Configuration (auto-detected if not specified)
gpu:
  memory_gb: null  # null for auto-detect
